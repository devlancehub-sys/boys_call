name: love_call_boys
description: Love Call - Male caller app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  socket_io_client: ^3.1.2
  zego_express_engine: 3.24.1
  shared_preferences: ^2.5.3
  device_info_plus: ^12.3.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.2
  flutter_ringtone_player: ^4.0.0+4
  flutter_svg: ^2.2.0
  permission_handler: ^11.4.0
  vibration: ^3.2.0
  flutter_riverpod: ^3.3.2
  riverpod: ^3.3.2
  go_router: ^17.3.0
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/image/application-icon-launcher.png
  adaptive_icon_background: "#FF2D7A"
  adaptive_icon_foreground: assets/image/application-icon-launcher.png
  background_color_ios: "#FF2D7A"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/incoming_call.mp3
    - assets/avatar_svg_girls_files/
    - assets/image/
